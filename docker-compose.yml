version: '3.8'

services:
  # === PostgreSQL Database ===
  postgres:
    image: postgres:16-alpine
    container_name: sdp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-swiss_dna}
      POSTGRES_USER: ${POSTGRES_USER:-sdp_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-sdp_admin} -d ${POSTGRES_DB:-swiss_dna}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sdp-network

  # === Redis Cache & Sessions ===
  redis:
    image: redis:7-alpine
    container_name: sdp-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    ports:
      - '${REDIS_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-changeme}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sdp-network

  # === MinIO (S3-compatible Storage) ===
  minio:
    image: minio/minio:latest
    container_name: sdp-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-sdp_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme123}
    volumes:
      - minio_data:/data
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sdp-network

  # === Backend (NestJS API) ===
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sdp-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-sdp_admin}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-swiss_dna}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-generate-a-secure-random-string-here}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-generate-another-secure-random-string}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-sdp_minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme123}
      MINIO_BUCKET: ${MINIO_BUCKET:-sdp-documents}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-generate-32-byte-hex-key-for-aes256}
    ports:
      - '${BACKEND_PORT:-3001}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sdp-network

  # === Frontend (Next.js) ===
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sdp-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-3001}
    ports:
      - '${FRONTEND_PORT:-3000}:3000'
    depends_on:
      - backend
    networks:
      - sdp-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  sdp-network:
    driver: bridge
