name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: swiss_dna_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: npx prisma generate

      - run: npm run build

      - name: Run lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/swiss_dna_test
          JWT_SECRET: test-secret-key-for-ci
          REDIS_URL: redis://localhost:6379
